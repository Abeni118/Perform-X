<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PerformX — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <div class="auth-split">
    <div class="auth-left">
      <div class="auth-content">
        <a href="../index.html" class="auth-brand">
          <div class="auth-brand-logo"><i class='bx bx-pulse'></i></div>
          <span class="auth-brand-name">PerformX</span>
        </a>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your account to continue</p>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i class='bx bx-envelope'></i>
              <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class='bx bx-lock-alt'></i>
              <input type="password" id="password" class="form-input" placeholder="Enter your password" required>  
              <button type="button" class="pw-toggle" id="togglePw" aria-label="Toggle password visibility">
                <i class='bx bx-show'></i>
              </button>
            </div>
          </div>

          <div class="form-actions">
            <label class="remember-me">
              <input type="checkbox" name="remember">
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <img src="../assets/login_bg.png" alt="Abstract 3D Shape" class="auth-bg-img">
      <div class="auth-right-overlay"></div>
      <div class="glass-card">
        <i class='bx bxs-dashboard'></i>
        <h3>Supercharge Your Workflow</h3>
        <p>PerformX provides you with the ultimate dashboard to track productivity, monitor KPIs, and elevate your
          team's performance to the next level.</p>
      </div>
    </div>
  </div>

  <script>
    const pwInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePw');
    const toggleIcon = toggleBtn.querySelector('i');

    toggleBtn.addEventListener('click', () => {
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        toggleIcon.classList.replace('bx-show', 'bx-hide');
      } else {
        pwInput.type = 'password';
        toggleIcon.classList.replace('bx-hide', 'bx-show');
      }
    });

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-submit');
      btn.textContent = 'Signing in...';
      btn.style.opacity = '0.8';

      setTimeout(() => {
        window.location.href = '../index.html'; // Navigate to dashboard
      }, 800);
    });
  </script>
</body>

</html>
